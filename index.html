<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沁隱軟裝空間設計｜丈量預約</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  }
  .logo {
    width: 72px; height: 72px;
    background: #5c4a3a;
    border-radius: 20px;
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 36px; height: 36px; fill: white; }
  .brand { font-size: 20px; font-weight: 700; color: #3a2e26; letter-spacing: 2px; margin-bottom: 6px; }
  .tagline { font-size: 13px; color: #9e8e80; letter-spacing: 1px; }
  .divider { width: 40px; height: 2px; background: #e8ddd5; margin: 24px auto; border-radius: 2px; }
  .title { font-size: 16px; font-weight: 600; color: #3a2e26; margin-bottom: 8px; }
  .desc { font-size: 13px; color: #9e8e80; line-height: 1.8; margin-bottom: 28px; }
  .steps { display: flex; justify-content: center; align-items: flex-start; gap: 4px; margin-bottom: 28px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .step-icon { width: 40px; height: 40px; background: #f5f0eb; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .step-text { font-size: 11px; color: #9e8e80; text-align: center; line-height: 1.4; }
  .step-arrow { color: #d4c4b8; font-size: 16px; padding-top: 12px; flex-shrink: 0; }
  .btn-line {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px;
    background: #06C755; color: white;
    border: none; border-radius: 14px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; text-decoration: none;
    margin-bottom: 12px;
  }
  .btn-line svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }
  .btn-secondary {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px;
    background: white; color: #5c4a3a;
    border: 1.5px solid #d4c4b8; border-radius: 14px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    margin-bottom: 0;
  }
  .hint { font-size: 12px; color: #c0b0a4; margin-top: 20px; line-height: 1.6; }
  #status-msg { font-size: 12px; color: #c0b0a4; margin-top: 8px; min-height: 18px; }

  /* Loading overlay */
  #loading-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(245,240,235,0.92);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    z-index: 100;
  }
  #loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #e0d6cc;
    border-top-color: #5c4a3a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: #9e8e80; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">讀取中...</div>
</div>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
  </div>
  <div class="brand">沁隱軟裝空間設計</div>
  <div class="tagline">CHINN INTERIOR DESIGN</div>

  <div class="divider"></div>

  <div class="title">預約免費丈量服務</div>
  <div class="desc">填寫需求表單，設計師將親自到府丈量<br>並提供初步設計建議與估價方向</div>

  <div class="steps">
    <div class="step">
      <div class="step-icon">💬</div>
      <div class="step-text">加入<br>官方帳號</div>
    </div>
    <div class="step-arrow">›</div>
    <div class="step">
      <div class="step-icon">📋</div>
      <div class="step-text">填寫<br>需求表單</div>
    </div>
    <div class="step-arrow">›</div>
    <div class="step">
      <div class="step-icon">🏠</div>
      <div class="step-text">設計師<br>到府丈量</div>
    </div>
  </div>

  <a class="btn-line" href="https://line.me/ti/p/@426ecavp">
    <svg viewBox="0 0 24 24"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
    加入 LINE 官方帳號
  </a>

  <button class="btn-secondary" onclick="openForm()">
    填寫預約丈量表單
  </button>

  <div id="status-msg"></div>
  <div class="hint">加入官方帳號後填寫表單<br>以便後續接收丈量通知</div>
</div>

<script>
const LIFF_ID = "2009845899-8rQXLHR7";
const FORM_BASE = "https://docs.google.com/forms/d/e/1FAIpQLSc_gztTlaJ4HbCh-k2eOszoF0hBMkSfwX3pKKknw0YdIh6CIQ/viewform";
const ENTRY_USERID = "entry.1780545459";

function showLoading(text) {
  document.getElementById("loading-text").textContent = text;
  document.getElementById("loading-overlay").classList.add("show");
}

function goToForm(userId) {
  const url = userId
    ? FORM_BASE + "?usp=pp_url&" + ENTRY_USERID + "=" + encodeURIComponent(userId)
    : FORM_BASE;
  window.location.href = url;
}

async function openForm() {
  showLoading("連線 LINE 中...");
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isInClient() && !liff.isLoggedIn()) {
      showLoading("請先登入 LINE...");
      liff.login();
      return;
    }

    showLoading("取得帳號資訊中...");
    const profile = await liff.getProfile();
    showLoading("開啟表單中...");
    goToForm(profile.userId);

  } catch (err) {
    // LIFF 失敗，直接開表單（不帶 userId）
    goToForm(null);
  }
}
</script>
</body>
</html>
